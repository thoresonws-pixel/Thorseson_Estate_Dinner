<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#c9a227">
    <title>Sign In — Thor's Murder Mysteries</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <!-- FirebaseUI -->
    <script src="https://www.gstatic.com/firebasejs/ui/6.1.0/firebase-ui-auth.js"></script>
    <link type="text/css" rel="stylesheet" href="https://www.gstatic.com/firebasejs/ui/6.1.0/firebase-ui-auth.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            position: relative;
            width: 100%;
            max-width: 420px;
            background: linear-gradient(145deg, #f5f0e6 0%, #e8e0d0 50%, #d4c9b5 100%);
            border: 3px solid #8b7355;
            box-shadow: 0 0 0 1px #a08060, 0 0 0 6px #2a2520, 0 0 0 8px #8b7355, 0 20px 60px rgba(0,0,0,0.5);
            padding: 50px 40px 40px;
            text-align: center;
        }
        .corner { position: absolute; width: 40px; height: 40px; border: 2px solid #8b7355; }
        .corner-tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .corner-tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 10px; left: 10px; border-right: none; border-top: none; }
        .corner-br { bottom: 10px; right: 10px; border-left: none; border-top: none; }
        .title { font-family: 'Playfair Display', Georgia, serif; font-size: 32px; color: #2a2520; margin-bottom: 6px; letter-spacing: 2px; }
        .subtitle { font-size: 13px; color: #8b7355; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
        .divider { display: flex; align-items: center; gap: 10px; margin: 18px 0 24px; }
        .divider-line { flex: 1; height: 1px; background: #8b7355; opacity: 0.4; }
        .divider-diamond { width: 8px; height: 8px; background: #c9a227; transform: rotate(45deg); }
        /* Override FirebaseUI styles to match our theme */
        .firebaseui-container { background: transparent !important; box-shadow: none !important; }
        .firebaseui-card-content { padding: 0 !important; }
        .mdl-button--raised.mdl-button--colored { background: #c9a227 !important; }
        .firebaseui-id-submit { background: #c9a227 !important; color: #2a2520 !important; font-family: 'Cormorant Garamond', serif !important; }
        #firebaseui-auth-container .firebaseui-card-header { display: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <h1 class="title">Sign In</h1>
    <p class="subtitle">Thor's Murder Mysteries</p>
    <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-diamond"></div>
        <div class="divider-line"></div>
    </div>
    <div id="firebaseui-auth-container"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyApHrYubqWrR4m0ihdpq6Ym40jv4HTQ5i0",
        authDomain: "thoreson-estate.firebaseapp.com",
        databaseURL: "https://thoreson-estate-default-rtdb.firebaseio.com",
        projectId: "thoreson-estate",
        storageBucket: "thoreson-estate.firebasestorage.app",
        messagingSenderId: "182924616892",
        appId: "1:182924616892:web:8153e1c69895cee665dcb9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.database();

    const ADMIN_EMAILS = ['thoresonws@gmail.com'];

    async function routeUser(user) {
        if (ADMIN_EMAILS.includes((user.email || '').toLowerCase())) {
            window.location.href = 'admin.html';
            return;
        }
        let role = null;
        for (let i = 0; i < 3; i++) {
            try {
                const snap = await db.ref('users/' + user.uid + '/role').once('value');
                role = snap.val();
                if (role) break;
            } catch(e) {}
            await new Promise(r => setTimeout(r, 800));
        }
        if (role === 'admin') {
            window.location.href = 'admin.html';
        } else {
            const snap = await db.ref('users/' + user.uid + '/currentGameId').once('value');
            window.location.href = snap.val() ? 'authenticated-dashboard.html' : 'join.html';
        }
    }

    // Handle auth state — fires after any sign in including FirebaseUI redirect
    auth.onAuthStateChanged(async user => {
        console.log('SIGNIN onAuthStateChanged:', user ? user.email : 'null');
        if (!user || user.isAnonymous) return;
        console.log('SIGNIN routing user:', user.email);

        // Ensure user record exists
        const snap = await db.ref('users/' + user.uid).once('value');
        if (!snap.exists()) {
            await db.ref('users/' + user.uid).set({
                displayName:   user.displayName || user.email.split('@')[0],
                email:         user.email,
                createdAt:     new Date().toISOString(),
                gamesPlayed:   [],
                currentGameId: null
            });
        }

        await routeUser(user);
    });

    // FirebaseUI config
    const uiConfig = {
        callbacks: {
            signInSuccessWithAuthResult: async function(authResult) {
                const user = authResult.user;
                // Ensure user record exists
                const snap = await db.ref('users/' + user.uid).once('value');
                if (!snap.exists()) {
                    await db.ref('users/' + user.uid).set({
                        displayName:   user.displayName || user.email.split('@')[0],
                        email:         user.email,
                        createdAt:     new Date().toISOString(),
                        gamesPlayed:   [],
                        currentGameId: null
                    });
                }
                await routeUser(user);
                return false;
            }
        },
        signInOptions: [
            firebase.auth.GoogleAuthProvider.PROVIDER_ID,
            {
                provider: firebase.auth.EmailAuthProvider.PROVIDER_ID,
                requireDisplayName: true
            }
        ],
        signInFlow: 'redirect',
        tosUrl: '#',
        privacyPolicyUrl: '#'
    };

    const ui = new firebaseui.auth.AuthUI(auth);
    ui.start('#firebaseui-auth-container', uiConfig);
</script>
</body>
</html>
