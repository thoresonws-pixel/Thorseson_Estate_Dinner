<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Thoreson Estate</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="items.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0e0c09;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      padding: 24px;
    }

    .card {
      background: #1a1712;
      border: 1px solid #3a3020;
      border-radius: 4px;
      max-width: 420px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    /* Category-specific header colors */
    .header { padding: 28px 28px 20px; text-align: center; }
    .header.clue       { background: linear-gradient(160deg, #1c2a1c, #0e1a0e); border-bottom: 1px solid #2a4a2a; }
    .header.container  { background: linear-gradient(160deg, #1a1a2a, #0e0e1a); border-bottom: 1px solid #2a2a4a; }
    .header.key        { background: linear-gradient(160deg, #2a2010, #1a1208); border-bottom: 1px solid #4a3a10; }
    .header.redherring { background: linear-gradient(160deg, #2a1010, #1a0808); border-bottom: 1px solid #4a1a1a; }
    .header.unknown    { background: linear-gradient(160deg, #1a1a1a, #0e0e0e); border-bottom: 1px solid #2a2a2a; }

    .estate-name {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #8a7a5a;
      margin-bottom: 16px;
    }

    .category-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Arial', sans-serif;
      margin-bottom: 16px;
    }
    .badge-clue       { background: #1e3a1e; color: #6ab86a; border: 1px solid #2a5a2a; }
    .badge-container  { background: #1e1e3a; color: #6a6ab8; border: 1px solid #2a2a5a; }
    .badge-key        { background: #3a2e10; color: #c8a84a; border: 1px solid #5a4a18; }
    .badge-redherring { background: #3a1010; color: #b86a6a; border: 1px solid #5a1a1a; }

    .item-number {
      font-size: 42px;
      font-weight: normal;
      color: #e8d9b8;
      line-height: 1;
      margin-bottom: 4px;
    }
    .item-number span { font-size: 22px; color: #8a7a5a; }

    .item-label {
      font-size: 13px;
      color: #6a5a3a;
      letter-spacing: 1px;
      margin-top: 6px;
      font-style: italic;
    }

    .body { padding: 24px 28px; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-size: 13px;
      font-family: 'Arial', sans-serif;
    }
    .status-new      { background: #1c2e1c; border: 1px solid #2a4a2a; color: #7ab87a; }
    .status-found    { background: #2a2010; border: 1px solid #4a3a10; color: #c8a84a; }
    .status-loading  { background: #1a1a1a; border: 1px solid #2a2a2a; color: #6a6a6a; }
    .status-error    { background: #2a1010; border: 1px solid #4a1a1a; color: #b86a6a; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-new   { background: #4a9a4a; }
    .dot-found { background: #c8a84a; }
    .dot-grey  { background: #4a4a4a; animation: pulse 1.5s infinite; }
    .dot-red   { background: #9a4a4a; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .divider {
      height: 1px;
      background: #2a2418;
      margin: 20px 0;
    }

    .progress-section { }
    .progress-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #6a5a3a;
      font-family: 'Arial', sans-serif;
      margin-bottom: 10px;
    }
    .progress-bar-bg {
      height: 4px;
      background: #2a2418;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4a7a4a, #7ab87a);
      border-radius: 2px;
      transition: width 0.6s ease;
    }
    .progress-text {
      font-size: 12px;
      color: #7a6a4a;
      font-family: 'Arial', sans-serif;
    }
    .progress-text strong { color: #c8a84a; }

    .footer {
      padding: 14px 28px;
      background: #141210;
      border-top: 1px solid #2a2418;
      text-align: center;
      font-size: 10px;
      color: #4a3a2a;
      letter-spacing: 1px;
      font-family: 'Arial', sans-serif;
    }

    .not-found-msg {
      text-align: center;
      padding: 40px 28px;
      color: #6a5a3a;
      font-size: 14px;
    }
    .not-found-msg .big { font-size: 32px; margin-bottom: 12px; }
  </style>
</head>
<body>

<div class="card" id="card">
  <div class="body" style="padding:40px;text-align:center;color:#6a5a3a;">
    Loading&hellip;
  </div>
</div>

<script>
  // ── Firebase config ─────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyDqAMdOIJasuTcrLYsegqxpLMDPVDDFKoA",
    authDomain: "thoreson-estate.firebaseapp.com",
    projectId: "thoreson-estate",
    storageBucket: "thoreson-estate.appspot.com",
    messagingSenderId: "476331181360",
    appId: "1:476331181360:web:53e0e83e6e2f8b3c4f2d1a"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ── Parse item from URL ─────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const itemId = params.get('item');

  // ── Category display config ─────────────────────────────────
  const categoryConfig = {
    clue:       { label: "Evidence",   badgeClass: "badge-clue",       headerClass: "clue",       icon: "🔍" },
    container:  { label: "Container",  badgeClass: "badge-container",  headerClass: "container",  icon: "🔒" },
    key:        { label: "Key",        badgeClass: "badge-key",        headerClass: "key",        icon: "🗝️" },
    redherring: { label: "Red Herring",badgeClass: "badge-redherring", headerClass: "redherring", icon: "🎭" },
  };

  async function init() {
    const card = document.getElementById('card');

    // Unknown item
    if (!itemId) {
      card.innerHTML = `<div class="not-found-msg"><div class="big">?</div>No item specified.</div>`;
      return;
    }

    // Look up item in registry
    const item = itemDatabase.find(i => i.id === itemId);
    if (!item) {
      card.innerHTML = `<div class="not-found-msg"><div class="big">?</div>This item is not recognized.</div>`;
      return;
    }

    const cfg = categoryConfig[item.category] || { label: item.category, badgeClass: "", headerClass: "unknown", icon: "📄" };

    // Total items of same category (for X of N display)
    const categoryItems = itemDatabase.filter(i => i.category === item.category);
    const categoryTotal = categoryItems.length;

    // Mark as found in Firebase + get total found count for clues
    let foundCount = 0;
    let isNew = false;
    let loadError = false;

    try {
      const ref = db.collection('foundItems').doc(itemId);
      const snap = await ref.get();
      if (!snap.exists) {
        await ref.set({ foundAt: firebase.firestore.FieldValue.serverTimestamp(), category: item.category });
        isNew = true;
      }
      // Count how many clue-type items of same category have been found
      const allFound = await db.collection('foundItems').where('category', '==', item.category).get();
      foundCount = allFound.size;
    } catch(e) {
      loadError = true;
    }

    // Build status message
    let statusHtml = '';
    if (loadError) {
      statusHtml = `<div class="status-row status-error"><div class="status-dot dot-red"></div>Could not connect to game server.</div>`;
    } else if (isNew) {
      statusHtml = `<div class="status-row status-new"><div class="status-dot dot-new"></div>This item has just been discovered.</div>`;
    } else {
      statusHtml = `<div class="status-row status-found"><div class="status-dot dot-found"></div>This item was already found.</div>`;
    }

    // Progress bar (only for clues — most satisfying to track)
    let progressHtml = '';
    if (item.category === 'clue' && !loadError) {
      const pct = Math.round((foundCount / categoryTotal) * 100);
      progressHtml = `
        <div class="divider"></div>
        <div class="progress-section">
          <div class="progress-label">Evidence collected</div>
          <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
          <div class="progress-text"><strong>${foundCount}</strong> of <strong>${categoryTotal}</strong> pieces of evidence found</div>
        </div>`;
    } else if (item.category !== 'clue' && !loadError) {
      progressHtml = `
        <div class="divider"></div>
        <div class="progress-section">
          <div class="progress-label">${cfg.label}s accounted for</div>
          <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${Math.round((foundCount/categoryTotal)*100)}%"></div></div>
          <div class="progress-text"><strong>${foundCount}</strong> of <strong>${categoryTotal}</strong> ${cfg.label.toLowerCase()}s found</div>
        </div>`;
    }

    card.innerHTML = `
      <div class="header ${cfg.headerClass}">
        <div class="estate-name">The Thoreson Estate &mdash; 1935</div>
        <div class="category-badge ${cfg.badgeClass}">${cfg.icon} &nbsp;${cfg.label}</div>
        <div class="item-number">${item._number} <span>/ ${categoryTotal}</span></div>
        <div class="item-label">${item.label}</div>
      </div>
      <div class="body">
        ${statusHtml}
        ${progressHtml}
      </div>
      <div class="footer">THORESON ESTATE &nbsp;·&nbsp; DALLAS, TEXAS &nbsp;·&nbsp; MARCH 21, 1935</div>
    `;
  }

  init();
</script>
</body>
</html>
