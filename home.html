<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#c9a227">
    <title>Thor's Mystery</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: #06040a;
            color: #f5f0e6;
            min-height: 100vh;
        }

        /* ── HEADER ─────────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            border-bottom: 1px solid rgba(201,162,39,0.15);
            background: rgba(6,4,10,0.9);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(8px);
        }
        .header-brand {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            color: #c9a227;
            letter-spacing: 2px;
        }
        .header-brand span {
            font-size: 11px;
            font-family: 'Special Elite', monospace;
            letter-spacing: 4px;
            color: rgba(201,162,39,0.5);
            display: block;
            margin-top: 2px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-user {
            font-size: 14px;
            color: rgba(245,240,230,0.6);
        }
        .btn-signout {
            background: none;
            border: 1px solid rgba(245,240,230,0.15);
            color: rgba(245,240,230,0.5);
            font-family: 'Special Elite', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            padding: 6px 14px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-signout:hover { color: #f5f0e6; border-color: rgba(245,240,230,0.4); }

        /* ── MAIN ────────────────────────────────────────────── */
        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 700;
            color: #c9a227;
            margin-bottom: 6px;
        }
        .page-sub {
            font-size: 15px;
            color: rgba(245,240,230,0.4);
            font-style: italic;
            margin-bottom: 40px;
        }

        /* ── JOIN BUTTON ─────────────────────────────────────── */
        .join-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 48px;
            align-items: center;
        }
        .join-input {
            flex: 1;
            max-width: 300px;
            padding: 14px 20px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(201,162,39,0.3);
            color: #f5f0e6;
            font-family: 'Special Elite', monospace;
            font-size: 18px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .join-input::placeholder { color: rgba(245,240,230,0.2); letter-spacing: 2px; font-size: 14px; text-transform: none; }
        .join-input:focus { outline: none; border-color: #c9a227; }
        .btn-join {
            padding: 14px 28px;
            background: #c9a227;
            color: #06040a;
            border: none;
            font-family: 'Special Elite', monospace;
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-join:hover { background: #e8c55a; }
        .btn-join:disabled { opacity: 0.5; cursor: not-allowed; }
        .join-error { font-size: 13px; color: #c0392b; margin-top: 8px; display: none; }

        /* ── SECTION TITLE ───────────────────────────────────── */
        .section-title {
            font-family: 'Special Elite', monospace;
            font-size: 11px;
            letter-spacing: 4px;
            color: rgba(201,162,39,0.5);
            text-transform: uppercase;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(201,162,39,0.1);
        }

        /* ── GAME CARDS ──────────────────────────────────────── */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px;
        }

        .game-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(201,162,39,0.12);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .game-card:hover { border-color: rgba(201,162,39,0.35); background: rgba(255,255,255,0.05); transform: translateY(-2px); }

        .game-card-stripe {
            height: 3px;
        }

        .game-card-body {
            padding: 20px 22px;
        }

        .game-card-party {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            color: #f5f0e6;
            margin-bottom: 4px;
        }

        .game-card-meta {
            font-family: 'Special Elite', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            color: rgba(245,240,230,0.4);
            margin-bottom: 14px;
        }

        .game-card-story {
            font-size: 13px;
            color: rgba(201,162,39,0.7);
            font-style: italic;
            margin-bottom: 16px;
        }

        .game-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-pill {
            font-family: 'Special Elite', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            padding: 4px 10px;
            text-transform: uppercase;
        }
        .status-upcoming { background: rgba(201,162,39,0.1); color: #c9a227; border: 1px solid rgba(201,162,39,0.3); }
        .status-active   { background: rgba(39,170,91,0.1);  color: #27aa5b; border: 1px solid rgba(39,170,91,0.3); }
        .status-complete { background: rgba(255,255,255,0.05); color: rgba(245,240,230,0.4); border: 1px solid rgba(255,255,255,0.08); }

        .btn-open {
            font-family: 'Special Elite', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            color: #c9a227;
            background: none;
            border: 1px solid rgba(201,162,39,0.3);
            padding: 6px 16px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .btn-open:hover { background: rgba(201,162,39,0.1); }

        /* ── EMPTY STATE ─────────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 80px 40px;
            border: 1px solid rgba(201,162,39,0.08);
            background: rgba(255,255,255,0.02);
        }
        .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
        .empty-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: rgba(245,240,230,0.4);
            margin-bottom: 8px;
        }
        .empty-sub { font-size: 14px; color: rgba(245,240,230,0.25); font-style: italic; }

        /* ── LOADING ─────────────────────────────────────────── */
        .loading-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            flex-direction: column;
            gap: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 32px; height: 32px;
            border: 2px solid rgba(201,162,39,0.2);
            border-top-color: #c9a227;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-text {
            font-family: 'Special Elite', monospace;
            font-size: 12px;
            letter-spacing: 3px;
            color: rgba(201,162,39,0.4);
            text-transform: uppercase;
        }

        /* ── TOAST ───────────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            font-family: 'Special Elite', monospace;
            font-size: 12px;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: rgba(39,170,91,0.9); color: white; }
        .toast.error   { background: rgba(192,57,43,0.9); color: white; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-brand">
        Thor's Mystery
        <span>An Evening of Intrigue</span>
    </div>
    <div class="header-right">
        <div class="header-user" id="headerUser"></div>
        <button class="btn-signout" onclick="signOut()">Sign Out</button>
    </div>
</div>

<div id="loadingScreen" class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">Loading…</div>
</div>

<div id="mainContent" style="display:none;">
    <div class="main">
        <div class="page-title" id="welcomeTitle">Welcome back</div>
        <div class="page-sub">Your evenings of intrigue</div>

        <!-- Join a party -->
        <div>
            <div style="margin-bottom:10px;">
                <input type="text" class="join-input" id="partyCodeInput"
                    placeholder="Enter party code" maxlength="12"
                    oninput="this.value=this.value.toUpperCase()">
                <button class="btn-join" onclick="joinParty()" id="joinBtn">Join Party</button>
            </div>
            <div class="join-error" id="joinError"></div>
        </div>

        <!-- Game cards -->
        <div class="section-title" style="margin-top:40px;">Your Parties</div>
        <div class="games-grid" id="gamesGrid">
            <div class="empty-state">
                <div class="empty-icon">🕯</div>
                <div class="empty-title">No parties yet</div>
                <div class="empty-sub">Enter a party code above to join your first mystery evening</div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
    apiKey: "AIzaSyApHrYubqWrR4m0ihdpq6Ym40jv4HTQ5i0",
    authDomain: "thoreson-estate.firebaseapp.com",
    databaseURL: "https://thoreson-estate-default-rtdb.firebaseio.com",
    projectId: "thoreson-estate",
    storageBucket: "thoreson-estate.firebasestorage.app",
    messagingSenderId: "182924616892",
    appId: "1:182924616892:web:8153e1c69895cee665dcb9"
});
const auth = firebase.auth();
const db   = firebase.database();

const STORY_META = {
    thoreson_estate_dinner: { badge: '🕯', color: '#1a2a4a', accent: '#c9a227', name: 'The Thoreson Estate Dinner' },
    devereaux_masquerade:   { badge: '🎭', color: '#1a0a2a', accent: '#c0392b', name: 'The Devereaux Masquerade' },
    last_train_wicker_park: { badge: '🚂', color: '#0a1a0a', accent: '#2ecc71', name: 'Last Train to Wicker Park' },
    thors_asgard:           { badge: '⚡', color: '#1a1400', accent: '#f0c040', name: "Thor's Asgard" }
};

let currentUser = null;
let userGames   = [];

auth.onAuthStateChanged(async user => {
    if (!user || user.isAnonymous) {
        // Brief wait — Firebase auth can be slow to restore after leaveGame clears localStorage
        await new Promise(r => setTimeout(r, 800));
        const refreshed = auth.currentUser;
        if (!refreshed || refreshed.isAnonymous) {
            window.location.href = 'signin.html';
            return;
        }
        user = refreshed;
    }
    currentUser = user;
    document.getElementById('headerUser').textContent = user.displayName || user.email;
    document.getElementById('welcomeTitle').textContent =
        'Welcome, ' + (user.displayName ? user.displayName.split(' ')[0] : 'back');

    await loadUserGames(user);

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';

    // If arriving from an invite link, auto-fill and trigger join
    const _urlParams = new URLSearchParams(window.location.search);
    const _inviteCode = _urlParams.get('code');
    if (_inviteCode) {
        const codeInput = document.getElementById('partyCodeInput');
        if (codeInput) {
            codeInput.value = _inviteCode.toUpperCase();
            // Scroll to it and trigger join
            codeInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
            setTimeout(() => joinGame(), 400);
        }
    }
});

async function loadUserGames(user) {
    const snap = await db.ref('users/' + user.uid).once('value');
    const userData = snap.val() || {};

    // Find all games this player is in
    const gamesSnap = await db.ref('games').once('value');
    const allGames  = gamesSnap.val() || {};

    userGames = [];
    Object.entries(allGames).forEach(([gameId, game]) => {
        if (game.players && game.players[user.uid]) {
            userGames.push({ gameId, ...game, playerData: game.players[user.uid] });
        }
    });

    // Sort by date descending
    userGames.sort((a, b) => new Date(b.eventDate || 0) - new Date(a.eventDate || 0));

    renderGameCards();
}

function renderGameCards() {
    const grid = document.getElementById('gamesGrid');

    if (userGames.length === 0) {
        grid.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">🕯</div>
                <div class="empty-title">No parties yet</div>
                <div class="empty-sub">Enter a party code above to join your first mystery evening</div>
            </div>`;
        return;
    }

    grid.innerHTML = userGames.map(game => {
        const story  = STORY_META[game.storyId] || STORY_META['thoreson_estate_dinner'];
        const date   = game.eventDate
            ? new Date(game.eventDate + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })
            : 'Date TBD';
        const status = game.status === 'active' ? 'active' : game.status === 'complete' ? 'complete' : 'upcoming';
        const statusLabel = { upcoming: 'Upcoming', active: 'Active', complete: 'Complete' }[status];
        const hasChar = game.playerData?.characterId && game.playerData?.status === 'ready';

        return `
        <div class="game-card" onclick="openGame('${game.gameId}', ${hasChar})">
            <div class="game-card-stripe" style="background:linear-gradient(90deg, ${story.color}, ${story.accent});"></div>
            <div class="game-card-body">
                <div class="game-card-party">${game.partyName || 'Mystery Evening'}</div>
                <div class="game-card-meta">${date}${game.venueName ? ' · ' + game.venueName : ''}</div>
                <div class="game-card-story">${story.badge} ${story.name}</div>
                <div class="game-card-footer">
                    <span class="status-pill status-${status}">${statusLabel}</span>
                    <button class="btn-open">${hasChar ? 'Open →' : 'Pick Character →'}</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

function openGame(gameId, hasChar) {
    if (hasChar) {
        // Store current game and go to dashboard
        db.ref('users/' + currentUser.uid + '/currentGameId').set(gameId).then(() => {
            window.location.href = 'authenticated-dashboard.html';
        });
    } else {
        // Go to character picker
        db.ref('users/' + currentUser.uid + '/currentGameId').set(gameId).then(() => {
            window.location.href = 'pick.html';
        });
    }
}

async function joinParty() {
    const code  = document.getElementById('partyCodeInput').value.trim().toUpperCase();
    const btn   = document.getElementById('joinBtn');
    const errEl = document.getElementById('joinError');

    errEl.style.display = 'none';
    if (!code) return;

    btn.disabled = true;
    btn.textContent = 'Joining…';

    try {
        // Find game by party code
        const snap = await db.ref('games').orderByChild('partyCode').equalTo(code).once('value');
        const data = snap.val();

        if (!data) {
            errEl.textContent = 'Party code not found. Check the code and try again.';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Join Party';
            return;
        }

        const [gameId, game] = Object.entries(data)[0];

        // Check if already in game
        if (game.players && game.players[currentUser.uid]) {
            await db.ref('users/' + currentUser.uid + '/currentGameId').set(gameId);
            window.location.href = game.players[currentUser.uid].status === 'ready' ? 'authenticated-dashboard.html' : 'pick.html';
            return;
        }

        // Add player to game
        await db.ref('games/' + gameId + '/players/' + currentUser.uid).set({
            displayName: currentUser.displayName || currentUser.email.split('@')[0],
            email:       currentUser.email || null,
            joinedAt:    new Date().toISOString(),
            status:      'selecting'
        });
        await db.ref('users/' + currentUser.uid + '/currentGameId').set(gameId);

        showToast('Joined! Pick your character.', 'success');
        window.location.href = 'questionnaire.html';

    } catch(err) {
        errEl.textContent = 'Something went wrong: ' + err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Join Party';
    }
}

document.getElementById('partyCodeInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinParty();
});

function signOut() {
    auth.signOut().then(() => window.location.href = 'signin.html');
}

function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + type;
    setTimeout(() => el.className = 'toast', 3000);
}
</script>
</body>
</html>
