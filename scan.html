<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thoreson Family Estate</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d0d;
    color: #c9a227;
    font-family: 'Playfair Display', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
  }
  .crest { width: 220px; max-width: 80vw; margin-bottom: 30px; }
  .found {
    font-size: 28px;
    letter-spacing: 3px;
    text-align: center;
    margin-bottom: 10px;
    color: #c9a227;
  }
  .sub {
    font-size: 15px;
    color: #8b7355;
    text-align: center;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  .logged {
    font-size: 13px;
    color: #555;
    text-align: center;
    font-style: italic;
    margin-top: 20px;
  }
  .not-logged {
    font-size: 14px;
    color: #8b4a4a;
    text-align: center;
    margin-top: 20px;
  }
  .login-btn {
    display: inline-block;
    margin-top: 16px;
    padding: 10px 28px;
    border: 1px solid #c9a227;
    color: #c9a227;
    text-decoration: none;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .divider {
    width: 60px;
    height: 1px;
    background: #c9a227;
    opacity: 0.3;
    margin: 0 auto 30px;
  }
</style>
</head>
<body>

  <polygon points="375,155 295,330 345,318 308,478 420,280 362,295 400,155" fill="#c9a227"/>
  <circle cx="210" cy="108" r="4.5" fill="#c9a227"/>
  <circle cx="470" cy="108" r="4.5" fill="#c9a227"/>
  <rect x="160" y="42" width="360" height="48" rx="3" fill="#c9a227"/>

  <rect x="482" y="220" width="98" height="100" rx="3" fill="#c9a227" opacity="0.08" stroke="#c9a227" stroke-width="1"/>
  <text x="531" y="265" text-anchor="middle" class="ct" font-size="11" letter-spacing="1" opacity="0.8">DALLAS</text>
  <text x="531" y="285" text-anchor="middle" class="ct" font-size="11" letter-spacing="1" opacity="0.8">TEXAS</text>
  <path d="M 185,668 Q 340,715 495,668 L 478,702 Q 340,748 202,702 Z" fill="#c9a227"/>
  <path d="M 185,668 L 202,702 L 182,720 Q 145,700 185,668 Z" fill="#a8871f"/>

<div class="found">You found a clue.</div>
<div class="sub">Bring this to the group</div>
<div class="divider"></div>

<div id="status" class="logged"></div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyApHrYubqWrR4m0ihdpq6Ym40jv4HTQ5i0",
    authDomain: "thoreson-estate.firebaseapp.com",
    databaseURL: "https://thoreson-estate-default-rtdb.firebaseio.com",
    projectId: "thoreson-estate",
    storageBucket: "thoreson-estate.firebasestorage.app",
    messagingSenderId: "182924616892",
    appId: "1:182924616892:web:8153e1c69895cee665dcb9"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  try {
    const session = JSON.parse(localStorage.getItem('userSession'));
    if (session && session.username) {
      const player = session.username;
      const charKey = session.character || player;

      // Log the scan
      const propId = new URLSearchParams(window.location.search).get('id') || 'unknown';
      const scanRef = db.ref('scans/' + player);
      scanRef.transaction(current => (current || 0) + 1);
      db.ref('scanLog').push({ player, charKey, propId, time: Date.now() });

      document.getElementById('status').textContent = 'Logged for ' + player;
    } else {
      document.getElementById('status').innerHTML =
        '<div class="not-logged">Not logged in — scan not recorded.</div>' +
        '<a href="signin.html" class="login-btn">Log In</a>';
    }
  } catch(e) {
    document.getElementById('status').textContent = '';
  }
</script>
</body>
</html>
